name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for OpenComputer — traces conversations, LLM calls, and tool usage. Opt-in via `opencomputer plugins enable observability/langfuse` or `opencomputer tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - HERMES_LANGFUSE_PUBLIC_KEY
  - HERMES_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
  # Part 2 Slice 1 - cross-agent trace linkage (DEFAULT-OFF: observability.langfuse.cross_agent)
  - subagent_start
  - subagent_stop
  # Part 2 Slice 2 - outcome-to-trace score bridge (DEFAULT-OFF: observability.langfuse.score_bridge)
  - on_session_end
