# Coder profile config.
#
# SOUL.md (in this same profile home) holds the durable identity. This file holds
# the model, and named personality overlays. A personality is a TEMPORARY,
# per-session mode applied with /personality; it never edits SOUL.md and clears on
# the next session. SOUL.md is who the agent permanently is.
#
# Model: the coding role gets a strong, instruction-faithful Claude coding model.
# Bump to claude-opus-4-8 for the hardest work; sonnet is the high-throughput
# default. If the profile ever ignores a restriction, switch to a more
# instruction-faithful model rather than lengthening SOUL.md.
model: claude-sonnet-4-6

personalities:
  brainstorm: "Brainstorm mode: explore options freely and defer judgement. Propose several distinct approaches with trade-offs before converging. Relax brevity; think out loud."
  terse: "Terse mode: answer in the fewest correct words. Prefer code and commands over prose. No preamble, no summary."
  reviewer: "Review mode: act as a skeptical independent reviewer of the current change. Hunt for bugs, security holes, race conditions, and untested edges. Default to REVISE over PASS when unsure; treat tests as immutable."
