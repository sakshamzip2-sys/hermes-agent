# Atlas (research analyst) profile config.
#
# SOUL.md holds the durable identity. Research is high-volume read-and-synthesize
# work, so the role gets a cheaper, fast model by default; bump it for a hard
# synthesis. Personalities are temporary per-session overlays via /personality.
model: claude-haiku-4-5

personalities:
  brainstorm: "Brainstorm mode: range wider across sources and angles before narrowing. Surface more hypotheses; defer judgement."
  terse: "Terse mode: deliver only the executive summary and the citations. No preamble."
  deep_dive: "Deep-dive mode: go past the summary into primary sources, methodology, and conflicting evidence. Show the reasoning chain and rate confidence per claim."
