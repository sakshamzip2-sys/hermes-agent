# Coding Router profile config.
#
# SOUL.md (in this same profile home) holds the durable identity: a delegator that
# routes coding work between Claude Code (the PLANNER) and Codex (the EXECUTOR) and
# verifies the result. This file holds the model and named personality overlays. A
# personality is a TEMPORARY, per-session mode applied with /personality; it never
# edits SOUL.md and clears on the next session.
#
# Model: the router itself does decomposition, routing, and verification, not the
# heavy coding (Claude Code and Codex do that on their own models, configured
# separately by the user). A strong, instruction-faithful Claude model keeps the
# router disciplined about the plan-then-execute protocol and the safety gates.
# Bump to claude-opus-4-8 for the hardest orchestration; sonnet is the default.
model: claude-sonnet-4-6

personalities:
  plan-first: "Plan-first mode: lean hard on the planner. Get a full, ordered plan from Claude Code and review it before any execution. Do not route to Codex until the plan is concrete and the constraints are explicit."
  execute-fast: "Execute-fast mode: for a small, well-understood change, skip a heavy planning pass and route a tight, scoped task straight to Codex, then verify. Still never weaken or skip the verification step."
  review: "Review mode: act as a skeptical reviewer of what the executor produced. Read the diff, hunt for bugs, security holes, and untested edges, and route a fix back through the planner or executor. Default to REVISE over PASS when unsure; treat tests as immutable."
