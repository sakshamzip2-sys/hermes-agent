# Coding Router profile config.
#
# Self-contained: this profile bundles its own pinned copies of the three skills it
# runs on (skills/claude-code, skills/codex, skills/swe-delegation) and ships a
# .no-bundled-skills marker so the global skill sync is skipped. The profile copies
# are the source of truth for this profile; they may intentionally diverge from the
# repo's global skills/autonomous-ai-agents/{claude-code,codex}. This is what lets
# the profile behave identically on any host (local and the 24/7 VM).
#
# SOUL.md (in this same profile home) holds the durable identity: a delegator that
# routes coding work between Claude Code (the PLANNER) and Codex (the EXECUTOR) and
# verifies the result. This file holds the model and named personality overlays. A
# personality is a TEMPORARY, per-session mode applied with /personality; it never
# edits SOUL.md and clears on the next session.
#
# Model: the router itself does decomposition, routing, and verification, not the
# heavy coding (Claude Code and Codex do that on their own models, configured
# separately by the user). A strong, instruction-faithful Claude model keeps the
# router disciplined about the plan-then-execute protocol and the safety gates.
# Bump `default` to claude-opus-4-8 for the hardest orchestration; sonnet is the default.
#
# The provider is pinned to OC-router (the standing routing target) so the CLI launch
# (`oc -p coding`) routes a claude-* model correctly. A bare `model: <name>` string
# would lose the provider and auto-route claude-* names to the anthropic endpoint.
# SECRET: the api_key is NOT committed here. The CLI, gateway, and web UI all read
# model.api_key from THIS profile's installed config.yaml
# (~/.hermes/profiles/coding/config.yaml) through the same provider-resolution path —
# there is no separate gateway-held key. Before a live CLI run, supply it in that
# installed file (never in this committed template), ONE of two ways:
#   - preferred (keeps the secret out of the config file): put
#     `OC_ROUTER_API_KEY=<your key>` in the profile's 0600 .env and set
#     `api_key: ${OC_ROUTER_API_KEY}` below — config load expands ${VAR} from the
#     profile .env (hermes_cli/config.py _expand_env_vars).
#   - direct: set `api_key: <your OC-router key>` below (like the default
#     ~/.hermes/config.yaml does).
model:
  default: claude-sonnet-4-6
  provider: custom
  base_url: https://router.tryopencomputer.com/v1
  api_mode: chat_completions
  max_tokens: 32000
  context_length: 200000

personalities:
  plan-first: "Plan-first mode: lean hard on the planner. Get a full, ordered plan from Claude Code and review it before any execution. Do not route to Codex until the plan is concrete and the constraints are explicit."
  execute-fast: "Execute-fast mode: for a small, well-understood change, skip a heavy planning pass and route a tight, scoped task straight to Codex, then verify. Still never weaken or skip the verification step."
  review: "Review mode: act as a skeptical reviewer of what the executor produced. Read the diff, hunt for bugs, security holes, and untested edges, and route a fix back through the planner or executor. Default to REVISE over PASS when unsure; treat tests as immutable."
